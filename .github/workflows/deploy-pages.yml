name: Deploy school website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "school-website/**"
      - "school-website-light/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site (dark at root, light at /light/)
        run: |
          mkdir -p _site
          cp -r school-website/. _site/
          cp -r school-website-light _site/light
          cp -r school-website-light _site/school-website-light

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
